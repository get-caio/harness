      - pattern: "OKHsl|LCH|perceptually uniform|constraint.*color"
        expect: present
        description: Specifies perceptually uniform color space as part of constraint
      - pattern: "spring.*physics|150ms|100ms|animation.*constraint|easing.*constraint"
        expect: present
        description: Defines animation vocabulary as a named constraint
      - pattern: "border.*radius|shadow|surface.*color|elevation.*model|constraint.*elevation"
        expect: present
