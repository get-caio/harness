  - id: abs-dp-002
    skill: design-philosophy
    task: >
      Audit a mockup that uses default shadcn/ui components with no
      customization. Identify which patterns are "sacred" (must not change)
      and which are "innovatable" (where differentiation should happen). Suggest
      specific token changes to establish a distinct visual identity.
    assertions:
      - pattern: "sacred|never.*break|Jakob.*Law|familiar.*fresh"
        expect: present
        description: Distinguishes sacred (unchangeable) from innovatable patterns
      - pattern: "nav.*position|form.*behavior|modal.*escape|keyboard.*nav|accessibility"
        expect: present
        description: Lists navigation, forms, and accessibility as sacred patterns
      - pattern: "typeface|typography|font.*differenti|Inter.*Geist|custom.*font"
        expect: present
        description: Identifies typography as the highest-impact differentiator
      - pattern: "50ms|trust.*penalty|visual.*shortcut|conversion|aesthetic.*usability"
        expect: present
        description: References the 50ms judgment window and its commercial impact
      - pattern: "Linear|Stripe|Vercel|Raycast|reference.*company"
        expect: present
        description: References specific design-led companies as implementation examples
