cases:
  # ── Auth & Security ──
  - id: ret-001
    task: "Add Google OAuth login and email/password signup to the Next.js app"
    expected: [auth, security]
    not_expected: [payments, seo-foundations, redis-caching, svg-animation]

  - id: ret-002
    task: "Protect API routes so only authenticated users with admin role can access them"
    expected: [auth, security, trpc]
    not_expected: [design-craft, local-seo, pinecone]

  # ── Data Layer ──
  - id: ret-003
    task: "Write a Drizzle ORM schema for users, teams, and team memberships with proper relations"
    expected: [drizzle-orm]
    not_expected: [react-native, svg-animation, shopify-remix, wordpress-plugin]

  - id: ret-004
    task: "Add a PostgreSQL migration that adds a new column to the users table without downtime"
    expected: [database-migrations, drizzle-orm]
    not_expected: [design-philosophy, interaction-motion, aeo-geo]

  # ── API ──
  - id: ret-005
    task: "Build a tRPC router with CRUD endpoints for managing training plans"
    expected: [trpc, testing]
    not_expected: [local-seo, cloudflare-dns, woocommerce]

  # ── Frontend ──
  - id: ret-006
    task: "Build a data table with sorting, filtering, and pagination using shadcn/ui"
    expected: [shadcn-tailwind, ui-patterns, react-best-practices]
    not_expected: [redis-caching, mysql-planetscale, heroku-deploy]

  - id: ret-007
    task: "Create empty states, loading skeletons, and error boundaries for the dashboard"
    expected: [design-craft, ui-patterns, shadcn-tailwind]
    not_expected: [drizzle-orm, ci-cd, stripe-billing]

  - id: ret-008
    task: "Design the color palette, typography scale, and spacing system for the app"
    expected: [visual-design, design-system]
    not_expected: [testing, database-migrations, trpc]

  # ── Payments ──
  - id: ret-009
    task: "Integrate Stripe for monthly subscriptions with a customer portal"
    expected: [stripe-billing, payments, security]
    not_expected: [react-native, vitepress, svg-animation]

  - id: ret-010
    task: "Handle Stripe webhooks for subscription lifecycle events"
    expected: [stripe-billing, payments, security]
    not_expected: [design-craft, local-seo, pinecone]

  # ── AI ──
  - id: ret-011
    task: "Use Claude API to generate personalized workout plans from user profile data"
    expected: [ai-integration]
