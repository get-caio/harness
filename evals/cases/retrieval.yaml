  - id: ret-013
    task: "Set up GitHub Actions CI pipeline with lint, type-check, unit tests, and E2E tests"
    expected: [ci-cd, testing, e2e-testing]
    not_expected: [design-craft, svg-animation, payments]

  - id: ret-014
    task: "Add structured logging, health check endpoint, and error tracking"
